name: Build and Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pos-app-web-c6tkv9
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Laravel React Deploy

    steps:

      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v5


      # PHP 8.4 Required Laravel 13
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo, mysql
          coverage: none


      # Node
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm


      # Check Environment
      - name: Environment Check
        run: |
          echo "PHP Version"
          php -v

          echo "Composer Version"
          composer -V

          echo "Node Version"
          node -v

          echo "NPM Version"
          npm -v


      # Composer Install
      - name: Install Composer Dependencies
        run: |
          composer install \
          --no-dev \
          --prefer-dist \
          --no-interaction \
          --no-progress \
          --optimize-autoloader


      # NPM Install
      - name: Install NPM Dependencies
        run: npm ci


      # Vite Check
      - name: Check Vite
        run: |
          npx vite --version


      # Frontend Build
      - name: Build Frontend
        run: npm run build


      # Check Manifest
      - name: Check Vite Manifest
        run: |
          if [ ! -f public/build/manifest.json ]; then
            echo "ERROR: Vite manifest missing"
            exit 1
          fi

          echo "Vite manifest exists"
          ls -la public/build


      # Create Deployment Folder
      - name: Prepare Deployment Package
        run: |
          rm -rf deploy

          mkdir deploy

          rsync -av ./ deploy/ \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=.env \
          --exclude=storage/logs


          echo "Deployment content:"
          ls -la deploy
          ls -la deploy/public/build


      # Deploy
      - name: Deploy to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "deploy/*"
          target: "/home/u884969733/domains/soft-afghan.com/pos-app"
          overwrite: true


      # Run Laravel Commands on Server
      - name: Laravel Cache Clear
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            cd /home/u884969733/domains/soft-afghan.com/pos-app

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Deployment completed successfully"
