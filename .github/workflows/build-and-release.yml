name: Build and Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pos-app-web-c6tkv9
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v5


      # Setup PHP 8.4
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo, mysql
          coverage: none


      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm


      # Install Laravel dependencies
      - name: Install Composer Dependencies
        run: |
          composer install \
          --no-dev \
          --optimize-autoloader \
          --prefer-dist \
          --no-interaction \
          --no-progress


      # Install React/Vite dependencies
      - name: Install NPM Dependencies
        run: npm ci


      # Check environment
      - name: Check Versions
        run: |
          php -v
          node -v
          npm -v
          npx vite --version


      # Build frontend
      - name: Build Frontend
        run: npm run build


      # Verify Vite output
      - name: Verify Vite Build
        run: |
          echo "Checking Vite build files..."
          ls -la public/build
          test -f public/build/manifest.json


      # Prepare deployment package
      - name: Prepare Deployment Package
        run: |
          rm -rf deploy
          mkdir -p deploy

          rsync -av \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=.env \
          --exclude=deploy \
          --exclude=storage/logs \
          ./ deploy/

          echo "Deployment package created"
          echo "Checking deploy/public/build..."
          ls -la deploy/public/build


      # Upload artifact (optional)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: deploy


      # Deploy to Hostinger
      - name: Deploy to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "deploy/"
          target: "/home/u884969733/domains/soft-afghan.com/pos-app"
          overwrite: true
