name: Build Release Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build deployable artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Package artifact
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/framework/cache/data' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/logs' \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='database/database.sqlite' \
            ./ dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-release
          path: dist/
          retention-days: 14

      # The deploy steps below run only when the Hostinger repository secrets
      # (HOSTINGER_SSH_HOST, HOSTINGER_SSH_USER, HOSTINGER_SSH_KEY,
      # HOSTINGER_APP_PATH) are configured; otherwise the workflow just
      # produces the downloadable artifact. See deploy/HOSTINGER_DEPLOY.md
      # for the manual equivalent of these steps.
      - name: Check whether Hostinger deploy secrets are configured
        id: cfg
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
        run: |
          if [ -n "$HOSTINGER_SSH_HOST" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Hostinger secrets not set - skipping live deploy, artifact only."
          fi

      - name: Deploy to Hostinger via rsync over SSH
        if: steps.cfg.outputs.deploy == 'true'
        uses: burnett01/rsync-deployments@7.0.2
        with:
          # Never delete server-side state: .env, storage (logos, logs,
          # sessions), the sqlite file, and cached bootstrap files stay.
          switches: >-
            -avz --delete
            --exclude=.env
            --exclude=storage/
            --exclude=bootstrap/cache/
            --exclude=database/database.sqlite
          path: dist/
          remote_path: ${{ secrets.HOSTINGER_APP_PATH }}
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Run remote migrations, seeders, and cache rebuild
        if: steps.cfg.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd "${{ secrets.HOSTINGER_APP_PATH }}"
            php artisan migrate --force
            php artisan db:seed --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
