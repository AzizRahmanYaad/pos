name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pos-web-app-c6tkv9
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build deployable artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Package artifact
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/framework/cache/data' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/logs' \
            --exclude='.env' \
            --exclude='dist' \
            ./ dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-release
          path: dist/
          retention-days: 14

      - name: Deploy to Hostinger via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete
          path: dist/
          remote_path: ${{ secrets.HOSTINGER_APP_PATH }}
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Run migrations and clear cache on Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            alias php=/opt/alt/php84/usr/bin/php
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
