name: Build and Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pos-app-web-c6tkv9
    tags:
      - 'v*'

permissions:
  contents: read


jobs:

  build:

    runs-on: ubuntu-latest

    name: Laravel React Build and Deploy


    steps:


      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v5



      # PHP 8.4 (Laravel 13 requirement)
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo, mysql
          coverage: none



      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm



      # Check Environment
      - name: Check Versions
        run: |
          php -v
          composer -V
          node -v
          npm -v



      # Install Laravel Dependencies
      - name: Install Composer Dependencies
        run: |
          composer install \
          --no-dev \
          --prefer-dist \
          --no-interaction \
          --no-progress \
          --optimize-autoloader



      # Install Frontend Dependencies
      - name: Install NPM Dependencies
        run: npm ci



      # Build React/Vite
      - name: Build Frontend
        run: npm run build



      # Verify Vite
      - name: Verify Vite Build
        run: |
          echo "Checking Vite manifest..."
          test -f public/build/manifest.json
          ls -la public/build



      # Deploy Directly To Hostinger
      - name: Deploy to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:

          host: ${{ secrets.HOSTINGER_SSH_HOST }}

          username: ${{ secrets.HOSTINGER_SSH_USER }}

          key: ${{ secrets.HOSTINGER_SSH_KEY }}

          port: ${{ secrets.HOSTINGER_SSH_PORT }}

          source: "./"

          target: "/home/u884969733/domains/soft-afghan.com/pos-app"

          overwrite: true

          rm: false



      # Run Laravel Commands On Server
      - name: Laravel Post Deployment
        uses: appleboy/ssh-action@v1.2.0
        with:

          host: ${{ secrets.HOSTINGER_SSH_HOST }}

          username: ${{ secrets.HOSTINGER_SSH_USER }}

          key: ${{ secrets.HOSTINGER_SSH_KEY }}

          port: ${{ secrets.HOSTINGER_SSH_PORT }}

          script: |

            cd /home/u884969733/domains/soft-afghan.com/pos-app

            echo "Clearing Laravel cache..."

            php artisan optimize:clear

            php artisan config:cache

            php artisan route:cache

            php artisan view:cache

            echo "Deployment completed successfully"
